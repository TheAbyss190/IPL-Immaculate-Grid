name: Daily Stat Updater

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  execute-task:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Download and Extract Data
        run: |
          mkdir -p data
          # Use -f to fail the script if the URL returns a 404/500 error
          curl -fL -o ipl_json.zip "https://cricsheet.org/downloads/ipl_json.zip"
          
          # Debug: Show the first few lines of the file to see if it's HTML
          head -n 5 ipl_json.zip
          
          # Try to unzip
          unzip -o ipl_json.zip -d ./data/ipl_json

      - name: Run Python Script
        run: |
          python "./data/Python Files/all-players.py"
          python "./data/Python Files/average.py"
          python "./data/Python Files/bowl-avg.py"
          python "./data/Python Files/economy.py"
          python "./data/Python Files/matches.py"
          python "./data/Python Files/player-identifiers.py"
          python "./data/Python Files/removing.py"
          python "./data/Python Files/runs.py"
          python "./data/Python Files/stats-init.py"
          python "./data/Python Files/strike-rate.py"
          python "./data/Python Files/teams.py"
          python "./data/Python Files/wickets.py"
